<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Pulse Music</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/three@0.164/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

width:100%;
height:100%;
overflow:hidden;
background:#020205;
font-family:'Outfit',sans-serif;

}

canvas{

position:fixed;
inset:0;
width:100%;
height:100%;
z-index:1;

}

body::before{

content:"";

position:fixed;

inset:0;

background:
radial-gradient(circle at 20% 30%,rgba(98,0,255,.25),transparent 35%),
radial-gradient(circle at 80% 70%,rgba(0,229,255,.18),transparent 35%),
radial-gradient(circle at center,#05060f,#000);

animation:aurora 10s linear infinite alternate;

z-index:0;

}

@keyframes aurora{

0%{

transform:scale(1) rotate(0deg);

}

100%{

transform:scale(1.25) rotate(8deg);

}

}

#particles{

position:fixed;

inset:0;

z-index:2;

pointer-events:none;

}

.particle{

position:absolute;

width:3px;

height:3px;

border-radius:50%;

background:#6cf7ff;

box-shadow:

0 0 8px cyan,

0 0 18px cyan;

animation:float linear infinite;

}

@keyframes float{

0%{

transform:translateY(120vh);

opacity:0;

}

10%{

opacity:1;

}

90%{

opacity:1;

}

100%{

transform:translateY(-20vh);

opacity:0;

}

}

#intro{

position:absolute;

left:50%;

top:50%;

transform:translate(-50%,-50%);

text-align:center;

z-index:20;

}

#logo{

font-size:90px;

font-weight:900;

letter-spacing:12px;

color:white;

text-shadow:

0 0 25px cyan,

0 0 80px #00c3ff,

0 0 140px #7d2cff;

opacity:0;

}

#tag{

margin-top:15px;

font-size:22px;

letter-spacing:8px;

color:#b8b8b8;

opacity:0;

}

#enter{

margin-top:45px;

padding:18px 70px;

border:none;

border-radius:100px;

font-size:18px;

font-weight:700;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

color:white;

cursor:pointer;

border:1px solid rgba(255,255,255,.15);

transition:.4s;

opacity:0;

}

#enter:hover{

transform:scale(1.08);

box-shadow:

0 0 25px cyan,

0 0 60px #7d2cff;

}

</style>

</head>

<body>

<canvas id="scene"></canvas>

<div id="particles"></div>

<div id="intro">

<h1 id="logo">

PULSE MUSIC

</h1>

<p id="tag">

FEEL EVERY BEAT

</p>

<button id="enter">

ENTER EXPERIENCE

</button>

</div></div>

<!-- Aurora Light -->
<div class="aurora a1"></div>
<div class="aurora a2"></div>
<div class="aurora a3"></div>

<!-- Mouse Glow -->
<div id="mouseGlow"></div>

<!-- 3D Piano -->
<div id="piano3d">

    <div class="top"></div>

    <div class="keys">

        <div class="white"></div>
        <div class="white"></div>
        <div class="white"></div>
        <div class="white"></div>
        <div class="white"></div>
        <div class="white"></div>
        <div class="white"></div>
        <div class="white"></div>

    </div>

</div>

<div id="notes">

<span>♪</span>
<span>♫</span>
<span>♬</span>
<span>♩</span>
<span>♫</span>
<span>♪</span>
<span>♬</span>

</div><!-- Aurora Light -->
<div class="aurora a1"></div>
<div class="aurora a2"></div>
<div class="aurora a3"></div>

<!-- Mouse Glow -->
<div id="mouseGlow"></div>

<!-- 3D Piano -->
<div id="piano3d">

    <div class="top"></div>

    <div class="keys">

        <div class="white"></div>
        <div class="white"></div>
        <div class="white"></div>
        <div class="white"></div>
        <div class="white"></div>
        <div class="white"></div>
        <div class="white"></div>
        <div class="white"></div>

    </div>

</div>

<div id="notes">

<span>♪</span>

</div>

</body>
</html>
