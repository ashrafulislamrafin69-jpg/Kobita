<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Music - Premium Experience</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.164/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #020205;
            font-family: 'Outfit', sans-serif;
        }

        canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Aurora Background */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(125, 44, 255, 0.3), transparent 45%),
                radial-gradient(circle at 80% 70%, rgba(0, 229, 255, 0.2), transparent 45%);
            animation: aurora 12s linear infinite alternate;
            z-index: 0;
        }

        @keyframes aurora {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.15) rotate(4deg); }
        }

        /* Intro UI */
        #intro {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            width: 100%;
        }

        #logo {
            font-size: clamp(45px, 8vw, 95px);
            font-weight: 900;
            letter-spacing: 15px;
            color: #fff;
            text-shadow: 0 0 20px cyan, 0 0 60px #7d2cff;
            opacity: 0;
            transform: translateY(40px);
        }

        #tag {
            margin-top: 15px;
            font-size: clamp(14px, 2vw, 20px);
            letter-spacing: 10px;
            color: #8fa0dd;
            opacity: 0;
            transform: translateY(30px);
        }

        #enter {
            margin-top: 50px;
            padding: 18px 65px;
            border: none;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: white;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: scale(0.8);
        }

        #enter:hover {
            transform: scale(1.08);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6), 0 0 60px rgba(125, 44, 255, 0.4);
            border-color: rgba(0, 255, 255, 0.6);
        }

        /* Main Music Content (শুরুতে লুকানো থাকবে) */
        #main-content {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        /* 3D-like Piano Container */
        #piano3d {
            display: flex;
            gap: 5px;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transform: rotateX(45deg);
            perspective: 1000px;
        }

        .key {
            width: 60px;
            height: 220px;
            background: linear-gradient(to bottom, #fff 70%, #e0e0e0 100%);
            border-radius: 0 0 8px 8px;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 8px 0 #b5b5b5, 0 15px 20px rgba(0,0,0,0.4);
        }

        .key:active, .key.active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #b5b5b5, 0 5px 10px rgba(0,0,0,0.4);
            background: linear-gradient(to bottom, #00ffff 0%, #7d2cff 100%);
        }

        /* Floating Status Text */
        #status-text {
            color: #00ffff;
            margin-bottom: 30px;
            font-size: 24px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px cyan;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <canvas id="scene"></canvas>

    <div id="intro">
        <h1 id="logo">PULSE MUSIC</h1>
        <p id="tag">FEEL EVERY BEAT</p>
        <button id="enter">ENTER EXPERIENCE</button>
    </div>

    <div id="main-content" id="mainContent">
        <h2 id="status-text">TOUCH THE KEYS</h2>
        <div id="piano3d">
            <div class="key" onclick="playNote(60)"></div>
            <div class="key" onclick="playNote(62)"></div>
            <div class="key" onclick="playNote(64)"></div>
            <div class="key" onclick="playNote(65)"></div>
            <div class="key" onclick="playNote(67)"></div>
            <div class="key" onclick="playNote(69)"></div>
            <div class="key" onclick="playNote(71)"></div>
            <div class="key" onclick="playNote(72)"></div>
        </div>
    </div>

    <script>
        // --- ১. GSAP এন্ট্রান্স অ্যানিমেশন ---
        window.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline();
            tl.to("#logo", { opacity: 1, y: 0, duration: 1.2, ease: "power4.out" })
              .to("#tag", { opacity: 1, y: 0, duration: 1, ease: "power3.out" }, "-=0.8")
              .to("#enter", { opacity: 1, scale: 1, duration: 0.8, ease: "back.out(1.5)" }, "-=0.6");
        });

        // --- ২. Three.js ইন্টারঅ্যাক্টিভ ব্যাকগ্রাউন্ড ---
        const canvas = document.getElementById('scene');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // কণা (Particles) তৈরি
        const count = 600;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);

        for(let i = 0; i < count * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 12;
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const material = new THREE.PointsMaterial({
            size: 0.04,
            color: 0x00ffff,
            transparent: true,
            opacity: 0.6
        });

        const particleMesh = new THREE.Points(geometry, material);
        scene.add(particleMesh);

        // অ্যানিমেশন লুপ
        let clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();
            
            particleMesh.rotation.y = elapsedTime * 0.03;
            particleMesh.rotation.x = elapsedTime * 0.015;

            renderer.render(scene, camera);
        }
        animate();

        // উইন্ডো রেসপন্সিভ করা
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ৩. বাটনে ক্লিক করার পর পরের ধাপে যাওয়ার কোড ---
        document.getElementById('enter').addEventListener('click', () => {
            // ইন্ট্রো হাইড করা
            gsap.to("#intro", { 
                opacity: 0, 
                y: -50, 
                duration: 0.8, 
                ease: "power2.inOut", 
                onComplete: () => {
                    document.getElementById('intro').style.display = 'none';
                    
                    // মেইন কন্টেন্ট শো করা
                    const mainContent = document.getElementById('main-content');
                    mainContent.style.opacity = 1;
                    mainContent.style.pointerEvents = "auto";
                    
                    // পিয়ানো আসার অ্যানিমেশন
                    gsap.from("#piano3d", { scale: 0.5, rotationX: 90, duration: 1.2, ease: "elastic.out(1, 0.75)" });
                    gsap.from("#status-text", { opacity: 0, y: -20, duration: 0.5, delay: 0.3 });
                    
                    // ব্যাকগ্রাউন্ডের থ্রিডি কণাগুলোর স্পিড ও সাইজ বাড়িয়ে দেওয়া
                    gsap.to(material, { size: 0.08, duration: 1 });
                }
            });
        });

        // --- ৪. অডিও সিন্থেসাইজার (পিয়ানো বাটন কাজ করার জন্য) ---
        // কোনো অডিও ফাইল ছাড়াই ব্রাউজার নিজে থেকেই সাউন্ড তৈরি করবে
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playNote(midiNote) {
            // সাউন্ড ফ্রিকোয়েন্সি বের করা
            const frequency = Math.pow(2, (midiNote - 69) / 12) * 440;
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine'; // মিষ্টি টোন
            oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            // আস্তে আস্তে সাউন্ড মিলিয়ে যাওয়ার ইফেক্ট
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 1.5);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 1.5);

            // ক্লিক করলে থ্রিডি কণাগুলো যেন রিয়্যাক্ট করে
            gsap.to(particleMesh.rotation, { z: particleMesh.rotation.z + 0.5, duration: 0.5 });
        }
    </script>
</body>
</html>
