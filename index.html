<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Music - Feel Every Beat</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.164/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #020205;
            font-family: 'Outfit', sans-serif;
        }

        /* Three.js Canvas */
        canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Aurora Glow Background */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(98, 0, 255, .25), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 229, 255, .18), transparent 40%),
                radial-gradient(circle at center, #05060f, #000);
            animation: aurora 15s linear infinite alternate;
            z-index: 0;
        }

        @keyframes aurora {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.2) rotate(5deg); }
        }

        /* HTML HTML Particles Layer */
        #particles {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #6cf7ff;
            box-shadow: 0 0 8px cyan, 0 0 18px cyan;
            animation: float linear infinite;
            bottom: -10px;
        }

        @keyframes float {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-110vh) translateX(50px); opacity: 0; }
        }

        /* Intro Section */
        #intro {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            width: 100%;
            max-width: 800px;
            padding: 0 20px;
        }

        #logo {
            font-size: clamp(40px, 8vw, 90px);
            font-weight: 900;
            letter-spacing: 12px;
            color: white;
            text-shadow: 0 0 25px cyan, 0 0 80px #00c3ff, 0 0 140px #7d2cff;
            opacity: 0;
            transform: translateY(30px);
        }

        #tag {
            margin-top: 15px;
            font-size: clamp(14px, 2vw, 22px);
            letter-spacing: 8px;
            color: #b8b8b8;
            opacity: 0;
            transform: translateY(20px);
        }

        #enter {
            margin-top: 45px;
            padding: 18px 70px;
            border: none;
            border-radius: 100px;
            font-size: 18px;
            font-weight: 700;
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: white;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, .15);
            transition: 0.4s ease;
            opacity: 0;
            transform: scale(0.9);
        }

        #enter:hover {
            transform: scale(1.08);
            box-shadow: 0 0 25px cyan, 0 0 60px #7d2cff;
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>

    <canvas id="scene"></canvas>

    <div id="particles"></div>

    <div id="intro">
        <h1 id="logo">PULSE MUSIC</h1>
        <p id="tag">FEEL EVERY BEAT</p>
        <button id="enter">ENTER EXPERIENCE</button>
    </div>

    <script>
        // --- ১. HTML পার্টিকল জেনারেটর ---
        const particlesContainer = document.getElementById('particles');
        const particleCount = 40;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            // র্যান্ডম পজিশন ও সাইজ
            particle.style.left = `${Math.random() * 100}vw`;
            const size = Math.random() * 3 + 1;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            
            // র্যান্ডম অ্যানিমেশন স্পিড ও ডিলে
            particle.style.animationDuration = `${Math.random() * 8 + 5}s`;
            particle.style.animationDelay = `${Math.random() * 5}s`;
            
            particlesContainer.appendChild(particle);
        }

        // --- ২. GSAP ইন্ট্রো অ্যানিমেশন ---
        window.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline();
            
            tl.to("#logo", { opacity: 1, y: 0, duration: 1.5, ease: "power4.out" })
              .to("#tag", { opacity: 1, y: 0, duration: 1.2, ease: "power3.out" }, "-=1.0")
              .to("#enter", { opacity: 1, scale: 1, duration: 1.0, ease: "back.out(1.7)" }, "-=0.8");
        });

        // --- ৩. Three.js বেসিক থ্রিডি স্পেস/ওয়েভ সেটাপ ---
        const canvas = document.getElementById('scene');
        const scene = new THREE.Scene();
        
        // ক্যামেরা
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        // রেন্ডারার
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // ক্যানভাসে একটি থ্রিডি অবজেক্ট (একটি চমৎকার ইন্টারঅ্যাক্টিভ ওয়েভ মেস)
        const geometry = new THREE.BufferGeometry();
        const count = 1000;
        const positions = new Float32Array(count * 3);

        for(let i = 0; i < count * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 10;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        // মেটেরিয়াল (বিন্দু বা গ্লোয়িং ডট তৈরি করার জন্য)
        const material = new THREE.PointsMaterial({
            size: 0.05,
            color: 0x00ffff,
            transparent: true,
            opacity: 0.8
        });

        const points = new THREE.Points(geometry, material);
        scene.add(points);

        // অ্যানিমেশন লুপ (এখানে অবজেক্টটি আস্তে আস্তে ঘুরবে)
        let clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const elapsedTime = clock.getElapsedTime();
            
            // হালকা থ্রিডি রোটেশন ইফেক্ট
            points.rotation.y = elapsedTime * 0.05;
            points.rotation.x = elapsedTime * 0.025;

            renderer.render(scene, camera);
        }
        animate();

        // রেসপন্সিভ উইন্ডো রিসাইজ হ্যান্ডলার
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // বোতামে ক্লিক করলে ছোট একটি আউট্রো অ্যানিমেশন
        document.getElementById('enter').addEventListener('click', () => {
            gsap.to("#intro", { opacity: 0, scale: 0.9, duration: 0.8, ease: "power2.inOut", onComplete: () => {
                document.getElementById('intro').style.display = 'none';
                // এখানে আপনি আপনার মেইন মিউজিক এক্সপেরিয়েন্স বা থ্রিডি পিয়ানো চালু করতে পারেন
                gsap.to(points.material, { size: 0.15, duration: 2 }); // থ্রিডি অবজেক্ট রিয়্যাক্ট করবে
            }});
        });
    </script>
</body>
</html>
